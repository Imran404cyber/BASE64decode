<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Decoder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Fira Code', 'Monaco', monospace;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .terminal-card {
            max-width: 800px;
            width: 100%;
            background: #0a0c10;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(88, 166, 255, 0.15);
            overflow: hidden;
        }

        .header-dots {
            background: #05070a;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 1px solid #21262d;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff5f56;
            box-shadow: 18px 0 0 #ffbd2e, 36px 0 0 #27c93f;
        }

        .content {
            padding: 2rem;
        }

        .input-area {
            background: #0d1117;
            border-radius: 1rem;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #21262d;
        }

        .label {
            color: #58a6ff;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        textarea {
            width: 100%;
            background: #010409;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 1rem;
            font-size: 0.9rem;
            font-family: 'Fira Code', monospace;
            border-radius: 0.8rem;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            line-height: 1.5;
        }

        textarea:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
        }

        textarea::placeholder {
            color: #3d444d;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0 1.8rem;
        }

        .btn {
            border: none;
            padding: 0.65rem 1.5rem;
            font-weight: 600;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }

        .btn-primary {
            background: #238636;
            color: white;
        }

        .btn-primary:hover {
            background: #2ea043;
            transform: scale(0.97);
        }

        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
        }

        .btn-secondary:hover {
            background: #2d333b;
        }

        .output-section {
            background: #0d1117;
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            border: 1px solid #21262d;
        }

        .output-header {
            color: #8b949e;
            font-size: 0.75rem;
            margin-bottom: 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .copy-icon {
            background: none;
            border: none;
            color: #58a6ff;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .copy-icon:hover {
            background: #1f242e;
            color: white;
        }

        pre {
            background: #010409;
            padding: 1rem;
            border-radius: 0.8rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #e6edf3;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            margin: 0;
            border-left: 3px solid #238636;
            min-height: 80px;
        }

        .error-msg {
            background: #3b1e1e;
            border-left: 4px solid #f85149;
            color: #ffb4b4;
            padding: 0.7rem;
            border-radius: 0.6rem;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 0.8rem;
        }

        .success-msg {
            background: #1a3a2a;
            border-left: 4px solid #3fb950;
            color: #b3f0c5;
            padding: 0.6rem 1rem;
            border-radius: 0.6rem;
            margin-top: 0.8rem;
            font-size: 0.8rem;
        }

        .footer {
            background: #05070a;
            text-align: center;
            padding: 0.8rem;
            font-size: 0.7rem;
            color: #6e7681;
            border-top: 1px solid #21262d;
        }
    </style>
</head>
<body>

<div class="terminal-card">
    <div class="header-dots">
        <div class="dot"></div>
    </div>
    <div class="content">
        <div class="input-area">
            <div class="label">BASE64 INPUT</div>
            <textarea id="base64Input" rows="3" placeholder="Paste your Base64 string here..."></textarea>
        </div>

        <div class="action-bar">
            <button id="decodeBtn" class="btn btn-primary">DECODE</button>
            <button id="clearBtn" class="btn btn-secondary">CLEAR</button>
        </div>

        <div class="output-section">
            <div class="output-header">
                <span>DECODED OUTPUT</span>
                <button id="copyOutputBtn" class="copy-icon">COPY</button>
            </div>
            <pre id="decodedOutput"></pre>
            <div id="messageArea"></div>
        </div>
    </div>
    <div class="footer">
        Ctrl + Enter to decode
    </div>
</div>

<script>
    const inputTextarea = document.getElementById('base64Input');
    const decodeButton = document.getElementById('decodeBtn');
    const clearButton = document.getElementById('clearBtn');
    const copyButton = document.getElementById('copyOutputBtn');
    const decodedPre = document.getElementById('decodedOutput');
    const messageDiv = document.getElementById('messageArea');

    function showMessage(msg, isError = false) {
        messageDiv.innerHTML = '';
        const msgBox = document.createElement('div');
        if (isError) {
            msgBox.className = 'error-msg';
            msgBox.innerText = msg;
        } else {
            msgBox.className = 'success-msg';
            msgBox.innerText = msg;
        }
        messageDiv.appendChild(msgBox);
        setTimeout(() => {
            if (messageDiv.firstChild === msgBox) {
                msgBox.style.opacity = '0';
                setTimeout(() => {
                    if (messageDiv.firstChild === msgBox) messageDiv.innerHTML = '';
                }, 200);
            }
        }, 3500);
    }

    function performBase64Decode() {
        let base64String = inputTextarea.value;
        
        if (base64String.trim() === '') {
            showMessage('Empty input! Provide a valid Base64 string.', true);
            decodedPre.innerText = '';
            return;
        }

        try {
            const binaryDecoded = atob(base64String.trim());
            const byteArray = new Uint8Array(binaryDecoded.length);
            for (let i = 0; i < binaryDecoded.length; i++) {
                byteArray[i] = binaryDecoded.charCodeAt(i);
            }
            const utf8String = new TextDecoder('utf-8').decode(byteArray);
            
            decodedPre.innerText = utf8String;
            showMessage(`Decoded successfully! (${utf8String.length} characters)`);
        } catch (error) {
            let errorDetail = error.message || 'Invalid base64 string';
            if (errorDetail.includes('Invalid character') || errorDetail.includes('atob')) {
                errorDetail = 'Invalid Base64 format. Please check your string.';
            }
            decodedPre.innerText = '';
            showMessage(`Exception: ${errorDetail}`, true);
        }
    }
    
    function clearAll() {
        inputTextarea.value = '';
        decodedPre.innerText = '';
        messageDiv.innerHTML = '';
        showMessage('Cleared.');
    }
    
    async function copyDecodedText() {
        let textToCopy = decodedPre.innerText;
        if (!textToCopy || textToCopy.trim() === '') {
            showMessage('No valid decoded text to copy! Decode something first.', true);
            return;
        }
        try {
            await navigator.clipboard.writeText(textToCopy);
            showMessage('Copied to clipboard!');
        } catch (err) {
            showMessage('Failed to copy.', true);
        }
    }
    
    function handleShortcut(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            performBase64Decode();
        }
    }
    
    decodeButton.addEventListener('click', performBase64Decode);
    clearButton.addEventListener('click', clearAll);
    copyButton.addEventListener('click', copyDecodedText);
    document.addEventListener('keydown', handleShortcut);
</script>
</body>
</html>
